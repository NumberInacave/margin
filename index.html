<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>margin</title>
	<style>
		:root {
			--bg: #fff;
			--text: #1a1a1a;
			--ui: #eee;
		}

		[data-theme="dark"] {
			--bg: #121212;
			--text: #e0e0e0;
			--ui: #2d2d2d;
		}

		* {
			box-sizing: border-box;
			scrollbar-width: none;
		}

		*::-webkit-scrollbar {
			display: none;
		}

		body {
			margin: 0;
			background: var(--bg);
			color: var(--text);
			font-family: "Georgia", serif;
			overflow: hidden;
			transition: background 0.4s ease;
		}

		.ctrls,
		#count {
			position: fixed;
			z-index: 100;
			transition: opacity 0.5s ease;
		}

		.ctrls {
			top: 10px;
			left: 10px;
			display: flex;
		}

		#count {
			bottom: 25px;
			left: 25px;
			font-size: 12px;
			opacity: 0.3;
			pointer-events: none;
		}

		.focus-hide {
			opacity: 0 !important;
			pointer-events: none;
		}

		#edit::placeholder {
			color: var(--text);
			opacity: 0.3;
		}

		.btn {
			background: none;
			border: none;
			color: var(--text);
			cursor: pointer;
			font-size: 22px;
			padding: 25px;
			opacity: 0.3;
			transition: opacity 0.2s;
		}

		.btn:hover {
			opacity: 1;
		}

		.wrap {
			max-width: 650px;
			margin: 0 auto;
			height: 100vh;
			position: relative;
			padding: 0 20px;
		}

		textarea,
		#pre {
			width: calc(100% - 40px);
			height: calc(100% - 140px);
			border: none;
			outline: none;
			font-family: inherit;
			font-size: 16px;
			line-height: 1.8;
			padding: 0;
			margin: 0;
			background: transparent;
			position: absolute;
			top: 100px;
			left: 20px;
			white-space: pre-wrap;
			word-wrap: break-word;
			overflow-y: scroll;
			transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
		}

		#pre {
			z-index: 1;
			color: var(--text);
		}

		textarea {
			z-index: 2;
			color: var(--text);
			caret-color: var(--text);
			resize: none;
			tab-size: 4;
		}

		.h1 {
			font-size: 1.8em;
			display: block;
			margin: 0.5em 0;
			border-bottom: 1px solid var(--ui);
			line-height: 1.2;
		}

		.h2 {
			font-size: 1.4em;
			display: block;
			margin: 0.5em 0;
			line-height: 1.2;
		}

		.b {
			font-weight: bold;
		}

		.i {
			font-style: italic;
		}

		.u {
			text-decoration: underline;
		}

		.s {
			text-decoration: line-through;
			opacity: 0.6;
		}

		.c {
			font-family: monospace;
			background: var(--ui);
			padding: 2px 4px;
			border-radius: 3px;
			font-size: 0.9em;
		}

		.k {
			font-family: monospace;
			background: var(--ui);
			padding: 2px 5px;
			border-radius: 4px;
			border-bottom: 2px solid #888;
			font-size: 0.85em;
		}

		.li {
			display: list-item;
			list-style-type: disc;
			margin-left: 25px;
		}

		sup {
			line-height: 0;
			font-size: 0.7em;
			vertical-align: super;
		}

		sub {
			line-height: 0;
			font-size: 0.7em;
			vertical-align: sub;
		}
	</style>
</head>

<body onmousedown="isDragging=true" onmouseup="handleEnd(event)">
	<div class="ctrls">
		<button class="btn" onclick="setTheme()">◯</button>
		<button class="btn" onclick="down()">⤓</button>
		<button class="btn" onclick="toggleInfo()">𝓲</button>
	</div>
	<div id="count">0 words</div>
	<div class="wrap" id="wrap">
		<div id="pre"></div>
		<textarea id="edit" spellcheck="false" autocomplete="off" placeholder="Write..."></textarea>
	</div>
	<script>
		const edit = document.getElementById('edit');
		const pre = document.getElementById('pre');
		const ctr = document.getElementById('count');
		const wrap = document.getElementById('wrap');
		const ctrls = document.querySelector('.ctrls');
		let isDragging = false, isViewingInfo = false, tempContent = "", focusTimer;

		const helpDoc = `# h1 header
## h2 header
- list (also * or +)

**bold**, __bold__ or <b>bold</b>
*italic*, _italic_ or <i>italic</i>
***both*** or ___both___
<u>underline</u>
~~strike~~ or <del>strike</del>

\`code\` or <code>code</code>
<kbd>kbd</kbd>
H<sub>2</sub>O (subscript)
E=mc<sup>2</sup> (superscript)`;

		edit.value = localStorage.getItem('m_doc') || "# example";
		if (localStorage.getItem('m_th') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

		function render() {
			const val = edit.value;
			let lines = val.split('\n').map(line => {
				let p = line.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
				p = p.replace(/&lt;br&gt;/gim, '<br>')
					.replace(/&lt;b&gt;(.*?)&lt;\/b&gt;/gim, '<span class="b">$1</span>')
					.replace(/&lt;i&gt;(.*?)&lt;\/i&gt;/gim, '<span class="i">$1</span>')
					.replace(/&lt;u&gt;(.*?)&lt;\/u&gt;/gim, '<span class="u">$1</span>')
					.replace(/&lt;del&gt;(.*?)&lt;\/del&gt;/gim, '<span class="s">$1</span>')
					.replace(/&lt;sup&gt;(.*?)&lt;\/sup&gt;/gim, '<sup>$1</sup>')
					.replace(/&lt;sub&gt;(.*?)&lt;\/sub&gt;/gim, '<sub>$1</sub>')
					.replace(/&lt;code&gt;(.*?)&lt;\/code&gt;/gim, '<span class="c">$1</span>')
					.replace(/&lt;kbd&gt;(.*?)&lt;\/kbd&gt;/gim, '<span class="k">$1</span>');
				p = p.replace(/\*\*\*(.*?)\*\*\*/g, '<span class="b i">$1</span>')
					.replace(/___(.*?)___/g, '<span class="b i">$1</span>')
					.replace(/\*\*(.*?)\*\*/g, '<span class="b">$1</span>')
					.replace(/__(.*?)__/g, '<span class="b">$1</span>')
					.replace(/~~(.*?)~~/g, '<span class="s">$1</span>')
					.replace(/\*(.*?)\*/g, '<span class="i">$1</span>')
					.replace(/_(.*?)_/g, '<span class="i">$1</span>')
					.replace(/`(.*?)`/g, '<span class="c">$1</span>');
				if (p.startsWith('# ')) return `<span class="h1">${p.slice(2)}</span>`;
				if (p.startsWith('## ')) return `<span class="h2">${p.slice(3)}</span>`;
				const indentMatch = p.match(/^(\s*)[-*+]\s+(.*)$/);
				if (indentMatch) {
					const spaces = indentMatch[1].replace(/\t/g, '    ').length;
					return `<span class="li" style="margin-left:${(spaces * 10) + 25}px">${indentMatch[2]}</span>`;
				}
				return p.replace(/\t/g, '&nbsp;&nbsp;&nbsp;&nbsp;') || '<br>';
			});
			pre.innerHTML = lines.join('\n');
			ctr.innerText = `${val.trim() ? val.trim().split(/\s+/).length : 0} words`;
			if (!isViewingInfo) localStorage.setItem('m_doc', val);
		}

		const resetFocusTimer = () => {
			ctrls.classList.remove('focus-hide');
			clearTimeout(focusTimer);
			focusTimer = setTimeout(() => {
				if (document.activeElement === edit) {
					ctrls.classList.add('focus-hide');
				}
			}, 2000);
		};

		edit.addEventListener('mousemove', resetFocusTimer);
		edit.addEventListener('keydown', resetFocusTimer);
		edit.addEventListener('focus', resetFocusTimer);
		edit.addEventListener('blur', () => ctrls.classList.remove('focus-hide'));
		edit.addEventListener('keydown', function (e) {
			if (e.key === 'Tab') {
				e.preventDefault();
				const s = this.selectionStart, f = this.selectionEnd;
				this.value = this.value.substring(0, s) + "\t" + this.value.substring(f);
				this.selectionStart = this.selectionEnd = s + 1;
			}
			if (e.key === 'Enter') {
				const start = this.selectionStart;
				const line = this.value.substring(0, start).split('\n').pop();
				const match = line.match(/^(\s*[-*+]\s+)/);
				if (match && line.trim().length > match[0].trim().length) {
					e.preventDefault();
					const bullet = "\n" + match[0];
					this.value = this.value.substring(0, start) + bullet + this.value.substring(this.selectionEnd);
					this.selectionStart = this.selectionEnd = start + bullet.length;
				}
			}
		});

		function toggle(isEditing) {
			if (isEditing) {
				edit.style.opacity = "1"; edit.style.pointerEvents = "auto";
				edit.style.transform = "scale(1)"; pre.style.opacity = "0";
				pre.style.transform = "scale(0.98)"; edit.scrollTop = pre.scrollTop;
			} else {
				edit.style.opacity = "0"; edit.style.pointerEvents = "none";
				edit.style.transform = "scale(0.98)"; pre.style.opacity = "1";
				pre.style.transform = "scale(1)"; pre.scrollTop = edit.scrollTop;
				render();
			}
		}

		function toggleInfo() {
			if (!isViewingInfo) { tempContent = edit.value; edit.value = helpDoc; isViewingInfo = true; toggle(true); }
			else { edit.value = tempContent; isViewingInfo = false; toggle(false); }
			render();
		}

		function handleEnd(e) {
			isDragging = false;
			if (e.target.tagName === 'BUTTON') return;
			const isOutside = (e.target === document.body || e.target === wrap);
			if (isOutside && !window.getSelection().toString()) { edit.blur(); toggle(false); }
			else if (!isOutside && document.activeElement !== edit) {
				const rect = pre.getBoundingClientRect();
				const relY = (e.clientY - rect.top) + pre.scrollTop;
				const lines = edit.value.split('\n');
				let pos = 0, targetLine = Math.min(Math.floor(relY / (16 * 1.8)), lines.length - 1);
				for (let i = 0; i < targetLine; i++) pos += lines[i].length + 1;
				toggle(true); edit.focus(); edit.setSelectionRange(pos, pos);
			}
		}

		edit.oninput = render;
		function setTheme() {
			const cur = document.documentElement.getAttribute('data-theme');
			const next = cur === 'dark' ? 'light' : 'dark';
			document.documentElement.setAttribute('data-theme', next);
			localStorage.setItem('m_th', next);
		}
		function down() {
			const a = document.createElement('a');
			a.href = URL.createObjectURL(new Blob([isViewingInfo ? tempContent : edit.value], { type: 'text/markdown' }));
			a.download = 'margin.md'; a.click();
		}
		render(); toggle(false);
	</script>
</body>

</html>
